# Cross-platform installer builds (wave 4).
#
# Triggers: manual (workflow_dispatch) or a v* tag push. There is NO automatic
# version bumping anywhere — versions are set by the repo owner only, in
# tauri.conf.json / Cargo.toml / package.json, before tagging.
#
# On a tag push, tauri-action also drafts a GitHub release (draft: true) with
# the installers attached; the owner publishes it manually. Manual runs just
# upload the installers as workflow artifacts.
#
# Runner notes:
# - ubuntu-24.04-arm is GitHub's free Linux ARM64 runner for PUBLIC repos
#   (GA January 2025). If the repo is ever made private this job needs a paid
#   larger runner or a self-hosted one.
# - macos-latest is Apple Silicon; the Intel build cross-compiles there via
#   --target x86_64-apple-darwin (the standard Tauri CI pattern).
# - Builds are unsigned (no certificates yet): macOS users must right-click >
#   Open on first launch; Windows SmartScreen may warn.

name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write # draft release creation on tag builds
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            args: ""
          # windows-11-arm is GitHub's free Windows ARM64 runner for PUBLIC
          # repos (GA April 2025); native aarch64 toolchain, NSIS arm64 installer.
          - name: windows-arm64
            runner: windows-11-arm
            args: ""
          - name: macos-arm64
            runner: macos-latest
            rust-targets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: macos-x64
            runner: macos-latest
            rust-targets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - name: linux-x64
            runner: ubuntu-22.04
            args: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            args: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri 2 Linux prerequisites (webkitgtk 4.1). libfuse2 is for the
      # AppImage tooling; on 24.04 the package is named libfuse2t64.
      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - run: npm ci

      # Bundle targets come from tauri.conf.json plus the per-platform
      # tauri.windows/macos/linux overlays: nsis / dmg / appimage+deb.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS-only: presence of these triggers tauri-action's built-in
          # codesign + notarize + staple. Left unset on Windows/Linux jobs.
          APPLE_CERTIFICATE: ${{ startsWith(matrix.runner, 'macos') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ startsWith(matrix.runner, 'macos') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.runner, 'macos') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.runner, 'macos') && secrets.APPLE_TEAM_ID || '' }}
          APPLE_ID: ${{ startsWith(matrix.runner, 'macos') && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ startsWith(matrix.runner, 'macos') && secrets.APPLE_PASSWORD || '' }}
        with:
          args: ${{ matrix.args }}
          # empty tagName (non-tag runs) = build only, no release
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('grue {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      # Plain tarball for distros where the AppImage's bundled WebKitGTK
      # clashes with the host graphics stack (Arch/Manjaro: EGL_BAD_PARAMETER,
      # blank window). Ships the bare binary + .desktop + icon + install.sh;
      # uses the system webkit2gtk-4.1 instead of a bundled copy.
      - name: Package Linux tarball
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          STAGE="grue-${VERSION}-linux-$(uname -m)"
          mkdir -p "tarball/$STAGE"
          cp src-tauri/target/release/grue "tarball/$STAGE/"
          cp packaging/linux/grue.desktop packaging/linux/install.sh \
             packaging/linux/uninstall.sh packaging/linux/README.txt "tarball/$STAGE/"
          cp src-tauri/icons/128x128.png "tarball/$STAGE/grue.png"
          chmod +x "tarball/$STAGE/install.sh" "tarball/$STAGE/uninstall.sh"
          tar -C tarball -czf "tarball/$STAGE.tar.gz" "$STAGE"

      - name: Attach tarball to draft release
        if: startsWith(matrix.runner, 'ubuntu') && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" tarball/*.tar.gz --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: grue-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            tarball/*.tar.gz

  # Arch/Manjaro package (.pkg.tar.zst). Repackages the linux-x64 binary from
  # the tarball artifact inside an Arch container; pacman then resolves the
  # webkit2gtk-4.1 dependency automatically on install (sudo pacman -U <file>).
  # Note: pacman forbids hyphens in versions, so 0.2.1-alpha becomes
  # 0.2.1_alpha in the package version — the app itself is unchanged.
  arch-package:
    needs: build
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions:
      contents: write # attach package to the draft release on tag builds
    steps:
      - name: Install packaging tools
        run: pacman -Syu --noconfirm git github-cli

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: grue-linux-x64
          path: artifact

      - name: Build pacman package
        run: |
          VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          PKGVER=$(echo "$VERSION" | tr '-' '_')
          mkdir -p pkgbuild
          tar -xzf artifact/tarball/*.tar.gz --strip-components=1 -C pkgbuild
          cp packaging/arch/PKGBUILD pkgbuild/
          sed -i "s/@VERSION@/$PKGVER/" pkgbuild/PKGBUILD
          useradd -m builder
          chown -R builder pkgbuild
          su builder -c 'cd pkgbuild && makepkg --nodeps'
        # --nodeps: webkit2gtk-4.1 is a runtime dep of the prebuilt binary,
        # no need to install it just to repackage.

      - name: Attach package to draft release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" pkgbuild/*.pkg.tar.zst --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: grue-arch-x64
          if-no-files-found: error
          path: pkgbuild/*.pkg.tar.zst
