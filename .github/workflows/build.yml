# Cross-platform installer builds (wave 4).
#
# Triggers: manual (workflow_dispatch) or a v* tag push. There is NO automatic
# version bumping anywhere — versions are set by the repo owner only, in
# tauri.conf.json / Cargo.toml / package.json, before tagging.
#
# On a tag push, tauri-action also drafts a GitHub release (draft: true) with
# the installers attached; the owner publishes it manually. Manual runs just
# upload the installers as workflow artifacts.
#
# Runner notes:
# - ubuntu-24.04-arm is GitHub's free Linux ARM64 runner for PUBLIC repos
#   (GA January 2025). If the repo is ever made private this job needs a paid
#   larger runner or a self-hosted one.
# - macos-latest is Apple Silicon; the Intel build cross-compiles there via
#   --target x86_64-apple-darwin (the standard Tauri CI pattern).
# - Builds are unsigned (no certificates yet): macOS users must right-click >
#   Open on first launch; Windows SmartScreen may warn.

name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write # draft release creation on tag builds
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            args: ""
          - name: macos-arm64
            runner: macos-latest
            rust-targets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: macos-x64
            runner: macos-latest
            rust-targets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - name: linux-x64
            runner: ubuntu-22.04
            args: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            args: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri 2 Linux prerequisites (webkitgtk 4.1). libfuse2 is for the
      # AppImage tooling; on 24.04 the package is named libfuse2t64.
      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - run: npm ci

      # Bundle targets come from tauri.conf.json plus the per-platform
      # tauri.windows/macos/linux overlays: nsis / dmg / appimage+deb.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # empty tagName (non-tag runs) = build only, no release
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('grue {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - uses: actions/upload-artifact@v4
        with:
          name: grue-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
